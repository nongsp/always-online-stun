name: Hourly STUN Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info
  IS_BEHIND_NAT: true

jobs:
  run-hourly-check:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Enable Cargo cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build project
        run: cargo build --release

      - name: Test IPv4 connectivity
        run: ping -4 -c 4 google.com

      - name: Test IPv6 connectivity (optional)
        run: ping -6 -c 4 google.com || true

      - name: Run STUN detection
        run: cargo run --release

      - name: Create timestamp
        id: timestamp
        run: echo "timestamp=$(date -u)" >> $GITHUB_OUTPUT

      - name: Commit and push results
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: STUN check ${{ steps.timestamp.outputs.timestamp }}
          commit_user_name: github-actions
          commit_user_email: github-actions@github.com
